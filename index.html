<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="רשימת קניות">
<meta name="theme-color" content="#1D9E75">
<title>רשימת קניות</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#1D9E75;--green-l:#E1F5EE;--green-d:#085041;
  --amber:#BA7517;--amber-l:#FAEEDA;
  --blue:#185FA5;--blue-l:#E6F1FB;
  --coral:#993C1D;--coral-l:#FAECE7;
  --purple:#534AB7;--purple-l:#EEEDFE;
  --orange:#C05621;--orange-l:#FEF3E7;
  --bg:#f8f7f4;--card:#fff;--border:rgba(0,0,0,0.1);
  --text:#2C2C2A;--muted:#888780;
}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,'Heebo',sans-serif;direction:rtl;background:var(--bg)}
.app{width:100%;max-width:430px;margin:0 auto;height:100vh;height:-webkit-fill-available;display:flex;flex-direction:column;background:var(--bg);padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.header{background:var(--card);border-bottom:0.5px solid var(--border);padding:12px 16px 8px;flex-shrink:0}
.header-row{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:18px;font-weight:600;color:var(--text)}
.header-btns{display:flex;gap:6px}
.hbtn{padding:5px 10px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--muted);-webkit-appearance:none}
.nav{display:flex;overflow-x:auto;gap:6px;padding:8px 16px;background:var(--card);border-bottom:0.5px solid var(--border);scrollbar-width:none;flex-shrink:0}
.nav::-webkit-scrollbar{display:none}
.nav-tab{flex-shrink:0;padding:6px 12px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid transparent;cursor:pointer;transition:all 0.2s;white-space:nowrap;user-select:none}
.nav-tab.active{color:#fff}
.nav-tab:not(.active){background:var(--bg);border-color:var(--border);color:var(--muted)}
#suggest-area{flex-shrink:0}
.main{display:flex;flex:1;overflow:hidden;min-height:0}

/* Regular panels */
.panel-products{width:52%;background:var(--card);border-left:0.5px solid var(--border);overflow-y:auto;display:flex;flex-direction:column;-webkit-overflow-scrolling:touch}
.panel-list{width:48%;background:var(--bg);overflow-y:auto;display:flex;flex-direction:column;-webkit-overflow-scrolling:touch}
.panel-header{padding:8px 12px;border-bottom:0.5px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:var(--card);z-index:2;flex-shrink:0}
.panel-header span{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.add-product-btn{width:26px;height:26px;border-radius:50%;border:none;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:300;-webkit-appearance:none}
.product-item{display:flex;align-items:center;gap:7px;padding:9px 10px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background 0.15s;user-select:none}
.product-item:active{background:var(--bg)}
.product-emoji{font-size:24px;width:34px;text-align:center;flex-shrink:0}
.product-name{font-size:13px;font-weight:500;color:var(--text);flex:1}
.product-hint{font-size:10px;color:var(--muted)}
.drag-handle{color:var(--muted);font-size:11px;opacity:0.4}
.remove-product-btn{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;-webkit-appearance:none}

/* Shopping list panel */
.list-header{padding:8px 12px;border-bottom:0.5px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:2;flex-shrink:0}
.list-header-top{display:flex;justify-content:space-between;align-items:center}
.list-header span{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}
.list-count{font-size:11px;color:var(--muted);margin-top:2px}
.progress-bar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:var(--green);transition:width 0.4s ease}
.drop-zone{flex:1;padding:6px;min-height:150px}
.drop-zone.drag-over{background:rgba(29,158,117,0.06);border-radius:8px}
.empty-list{text-align:center;padding:30px 10px;color:var(--muted)}
.empty-list .arrow{font-size:24px;margin-bottom:6px}
.empty-list p{font-size:11px;line-height:1.6}
.list-item{background:var(--card);border-radius:10px;border:0.5px solid var(--border);padding:7px 8px;margin-bottom:5px;display:flex;align-items:center;gap:5px;animation:slideIn 0.2s ease;transition:opacity 0.3s}
.list-item.checked{opacity:0.45;border-color:var(--green)}
.list-item.checked .list-item-name{text-decoration:line-through;color:var(--muted)}
@keyframes slideIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
.check-btn{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s;font-size:14px;-webkit-appearance:none}
.check-btn.done{background:var(--green);border-color:var(--green);color:#fff}
.list-item-emoji{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.list-item-info{flex:1;min-width:0}
.list-item-name{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qty-input{width:36px;border:1px solid var(--border);border-radius:6px;padding:3px 2px;font-size:12px;text-align:center;background:var(--bg);color:var(--text);-webkit-appearance:none}
.qty-input:focus{outline:none;border-color:var(--green)}
.remove-btn{width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:#E24B4A;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1;-webkit-appearance:none}
.clear-btn{font-size:10px;padding:3px 8px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;-webkit-appearance:none}

/* Drag ghost */
.drag-ghost{position:fixed;pointer-events:none;z-index:1000;opacity:0.9;background:var(--card);border-radius:10px;border:1.5px solid var(--green);padding:7px 12px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--text);box-shadow:0 4px 20px rgba(0,0,0,0.12)}

/* Modals */
.modal-wrap{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:430px;max-height:80vh;overflow-y:auto}
.modal h3{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text)}
.modal input[type=text]{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px 12px;font-size:16px;background:var(--bg);color:var(--text);margin-bottom:10px;direction:rtl;-webkit-appearance:none}
.modal input:focus{outline:none;border-color:var(--green)}
.emoji-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
.emoji-opt{font-size:22px;cursor:pointer;padding:4px 6px;border-radius:8px;border:2px solid transparent;user-select:none}
.emoji-opt.sel{border-color:var(--green);background:var(--green-l)}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:12px;border-radius:10px;font-size:15px;font-weight:500;cursor:pointer;border:none;-webkit-appearance:none}
.btn-cancel{background:var(--bg);color:var(--muted)}
.btn-add{color:#fff}

/* Banners */
.suggest-banner{background:var(--green-l);border-bottom:0.5px solid rgba(29,158,117,0.25);padding:9px 14px;display:flex;align-items:center;gap:8px}
.suggest-banner p{font-size:11px;color:var(--green-d);flex:1;line-height:1.5}
.suggest-btn{font-size:11px;padding:6px 11px;border-radius:20px;background:var(--green);color:#fff;border:none;cursor:pointer;white-space:nowrap;flex-shrink:0;-webkit-appearance:none}

/* Side panel */
.side-panel{background:var(--card);border-top:0.5px solid var(--border);flex-shrink:0;max-height:260px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.history-panel{padding:12px 16px}
.history-panel h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
.hist-card{background:var(--bg);border-radius:10px;border:0.5px solid var(--border);padding:8px 12px;margin-bottom:6px}
.hist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.hist-title{font-size:12px;font-weight:600;color:var(--text)}
.hist-date{font-size:10px;color:var(--muted)}
.hist-items{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px}
.use-list-btn{font-size:11px;padding:4px 10px;border-radius:20px;border:1px solid var(--green);background:transparent;color:var(--green);cursor:pointer;-webkit-appearance:none}
.finish-btn{width:100%;padding:11px;border-radius:10px;background:var(--green);color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:500;margin-top:8px;-webkit-appearance:none}
.export-area{padding:12px 16px}
.export-area h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px}
.export-text{width:100%;border:1px solid var(--border);border-radius:8px;padding:9px;font-size:12px;background:var(--bg);color:var(--text);direction:rtl;min-height:90px;resize:none;-webkit-appearance:none}
.export-row{display:flex;gap:8px;margin-top:8px}
.export-btn{flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--bg);color:var(--text);-webkit-appearance:none}
.cat-label{font-size:10px;font-weight:600;color:var(--muted);margin:8px 0 4px}

/* Toast */
.toast{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:300;opacity:0;transition:opacity 0.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}

/* ── RECIPES PANEL ─────────────────────────────────── */
.recipes-full{width:100%;display:flex;flex-direction:column;overflow:hidden}

/* URL input bar */
.recipe-input-bar{padding:10px 12px;background:var(--card);border-bottom:0.5px solid var(--border);flex-shrink:0}
.recipe-input-row{display:flex;gap:6px;align-items:center}
.yt-input{flex:1;border:1px solid var(--border);border-radius:10px;padding:9px 12px;font-size:14px;background:var(--bg);color:var(--text);direction:ltr;-webkit-appearance:none}
.yt-input:focus{outline:none;border-color:#FF0000}
.yt-input::placeholder{color:var(--muted);direction:rtl;text-align:right}
.analyze-btn{padding:9px 14px;border-radius:10px;background:#FF0000;color:#fff;border:none;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;-webkit-appearance:none;flex-shrink:0}
.analyze-btn:disabled{background:var(--muted);cursor:not-allowed}
.analyzing-bar{padding:8px 12px;background:#FFF5F5;border-bottom:0.5px solid rgba(255,0,0,0.15);display:flex;align-items:center;gap:8px;font-size:12px;color:#993C1D}
.spinner{width:16px;height:16px;border:2px solid rgba(153,60,29,0.2);border-top-color:#993C1D;border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* Recipes list */
.recipes-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px}

/* Recipe card */
.recipe-card{background:var(--card);border-radius:12px;border:0.5px solid var(--border);margin-bottom:10px;overflow:hidden}
.recipe-card-header{padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.recipe-card-header:active{background:var(--bg)}
.recipe-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--bg)}
.recipe-thumb-placeholder{width:44px;height:44px;border-radius:8px;background:var(--orange-l);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.recipe-info{flex:1;min-width:0}
.recipe-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recipe-meta{font-size:10px;color:var(--muted);margin-top:2px}
.recipe-chevron{font-size:12px;color:var(--muted);transition:transform 0.2s;flex-shrink:0}
.recipe-chevron.open{transform:rotate(180deg)}
.recipe-actions{display:flex;gap:6px;padding:0 10px 8px;flex-shrink:0}
.recipe-add-all{flex:1;padding:7px;border-radius:8px;background:var(--green);color:#fff;border:none;cursor:pointer;font-size:12px;font-weight:500;-webkit-appearance:none}
.recipe-delete{padding:7px 10px;border-radius:8px;background:var(--bg);border:1px solid var(--border);color:#E24B4A;cursor:pointer;font-size:12px;-webkit-appearance:none}

/* Ingredients list inside card */
.recipe-ingredients{border-top:0.5px solid var(--border)}
.ingredient-row{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:0.5px solid var(--border);cursor:pointer;user-select:none;transition:background 0.15s}
.ingredient-row:last-child{border-bottom:none}
.ingredient-row:active{background:var(--bg)}
.ingredient-row.selected{background:var(--green-l)}
.ing-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all 0.2s}
.ingredient-row.selected .ing-check{background:var(--green);border-color:var(--green);color:#fff}
.ing-emoji{font-size:18px;width:24px;text-align:center;flex-shrink:0}
.ing-name{font-size:12px;font-weight:500;color:var(--text);flex:1}
.ing-qty{font-size:11px;color:var(--muted);text-align:left;direction:ltr}
.recipe-add-selected{width:calc(100% - 20px);margin:0 10px 10px;padding:8px;border-radius:8px;background:var(--orange-l);color:var(--orange);border:1px solid rgba(192,86,33,0.25);cursor:pointer;font-size:12px;font-weight:500;-webkit-appearance:none}
.recipe-add-selected:disabled{opacity:0.4;cursor:not-allowed}

/* Empty recipes */
.empty-recipes{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-recipes .big-icon{font-size:40px;margin-bottom:12px}
.empty-recipes h3{font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px}
.empty-recipes p{font-size:12px;line-height:1.6}

/* list-item source tag */
.item-source{font-size:9px;color:var(--orange);background:var(--orange-l);border-radius:4px;padding:1px 4px;margin-top:1px;display:inline-block}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="header">
    <div class="header-row">
      <h1>🛒 רשימות קניות</h1>
      <div class="header-btns">
        <button class="hbtn" onclick="togglePanel('history')">📋 היסטוריה</button>
        <button class="hbtn" onclick="togglePanel('export')">📤 ייצוא</button>
      </div>
    </div>
  </div>
  <div class="nav" id="nav"></div>
  <div id="suggest-area"></div>
  <div class="main" id="main-area">
    <!-- filled by render() -->
  </div>
  <div class="side-panel" id="side-panel" style="display:none"></div>
</div>
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════
   DATA
═══════════════════════════════════════════════ */
const CATS=[
  {id:'super-complete',label:'סופר – השלמה',icon:'🧴',color:'#1D9E75',
   products:[{e:'🥛',n:'חלב'},{e:'🍞',n:'לחם'},{e:'🧀',n:'גבינה צהובה'},{e:'🥚',n:'ביצים'},{e:'🧅',n:'בצל'},{e:'🍋',n:'לימון'},{e:'🧈',n:'חמאה'},{e:'🍶',n:'שמן זית'},{e:'🫙',n:'רסק עגבניות'},{e:'🧃',n:'מיץ'},{e:'☕',n:'קפה'},{e:'🍚',n:'אורז'}]},
  {id:'super-big',label:'סופר – קניה גדולה',icon:'🛒',color:'#0F6E56',
   products:[{e:'🍗',n:'עוף'},{e:'🥩',n:'בשר'},{e:'🐟',n:'דג'},{e:'🥗',n:'ירקות מעורב'},{e:'🍅',n:'עגבניות'},{e:'🥒',n:'מלפפון'},{e:'🧻',n:'נייר טואלט'},{e:'🧼',n:'סבון'},{e:'🫧',n:'אבקת כביסה'},{e:'🍪',n:'עוגיות'},{e:'🥜',n:'טחינה'},{e:'🫒',n:'זיתים'},{e:'🧆',n:'חומוס'},{e:'🥫',n:'שימורים'},{e:'🍿',n:'פופקורן'}]},
  {id:'bbq',label:'על האש',icon:'🔥',color:'#993C1D',
   products:[{e:'🥩',n:'סטייק'},{e:'🌭',n:'נקניקיות'},{e:'🍗',n:'כנפיים'},{e:'🌽',n:'תירס'},{e:'🧅',n:'בצל לגריל'},{e:'🍆',n:'חציל'},{e:'🍄',n:'פטריות'},{e:'🧄',n:'שום'},{e:'🫙',n:'רוטב ברביקיו'},{e:'🥖',n:'פיתות'},{e:'🥗',n:'סלט קצוץ'},{e:'🧂',n:'תבלינים'}]},
  {id:'beach',label:'ים',icon:'🏖️',color:'#185FA5',
   products:[{e:'🧴',n:'קרם שמש'},{e:'💧',n:'מים מינרל'},{e:'🥤',n:'שתייה קלה'},{e:'🍉',n:'אבטיח'},{e:'🍇',n:'ענבים'},{e:'🥪',n:'כריכים'},{e:'🍫',n:'שוקולד'},{e:'🥜',n:'בוטנים'},{e:'🍦',n:'גלידה'},{e:'🎪',n:'מחצלת'}]},
  {id:'birthday',label:'יום הולדת',icon:'🎂',color:'#534AB7',
   products:[{e:'🎂',n:'עוגה'},{e:'🕯️',n:'נרות'},{e:'🎈',n:'בלונים'},{e:'🧁',n:'קאפקייקס'},{e:'🍭',n:'ממתקים'},{e:'🥂',n:'שתייה חגיגית'},{e:'🎁',n:'ניילון מתנה'},{e:'🎉',n:'מפזרת'},{e:'🧃',n:'מיצים לילדים'},{e:'🍕',n:'פיצה'}]},
  {id:'picnic',label:'פיקניק',icon:'🧺',color:'#BA7517',
   products:[{e:'🥪',n:'כריכים'},{e:'🍇',n:'פירות'},{e:'🧀',n:'גבינות'},{e:'🥖',n:'לחמניות'},{e:'🫙',n:'ריבה'},{e:'🥒',n:'ירקות חתוכים'},{e:'🍫',n:'שוקולד'},{e:'🧃',n:'מיצים'},{e:'☕',n:'תרמוס קפה'},{e:'🍪',n:'עוגיות'},{e:'💧',n:'מים'}]},
  {id:'recipes',label:'מתכונים',icon:'🍳',color:'#C05621',products:[]}
];

let activeCat='super-complete';
let shoppingList={};
let dragItem=null,dragGhost=null,touchProduct=null;
let activePanel=null;
let selEmoji='🛍️';
let analyzingRecipe=false;
let expandedRecipes={};   // recipeId -> true/false
let selectedIngredients={}; // recipeId -> Set of ingredient indices

/* ═══════════════════════════════════════════════
   STORAGE HELPERS
═══════════════════════════════════════════════ */
function store(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}
function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function getUserProducts(id){return load('extra_'+id,[])}
function saveUserProduct(id,p){const a=getUserProducts(id);a.push(p);store('extra_'+id,a)}
function deleteUserProduct(id,n){store('extra_'+id,getUserProducts(id).filter(p=>p.n!==n))}
function getAllProducts(id){const cat=CATS.find(c=>c.id===id);return[...(cat?.products||[]),...getUserProducts(id)]}
function getHistory(){return load('shop_history',[])}
function saveToHistory(catId,items){
  if(!items.length)return;
  const cat=CATS.find(c=>c.id===catId);
  const hist=getHistory();
  hist.unshift({catId,catLabel:cat?.label||catId,date:new Date().toLocaleDateString('he-IL'),items:[...items]});
  store('shop_history',hist.slice(0,20));
}
function getRecipes(){return load('saved_recipes',[])}
function saveRecipe(r){const rs=getRecipes();rs.unshift(r);store('saved_recipes',rs.slice(0,30))}
function deleteRecipe(id){store('saved_recipes',getRecipes().filter(r=>r.id!==id))}

/* ═══════════════════════════════════════════════

═══════════════════════════════════════════════ */
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
function getCat(){return CATS.find(c=>c.id===activeCat)}

/* ═══════════════════════════════════════════════
   NAV
═══════════════════════════════════════════════ */
function renderNav(){
  const nav=document.getElementById('nav');nav.innerHTML='';
  CATS.forEach(cat=>{
    const tab=document.createElement('div');
    tab.className='nav-tab'+(cat.id===activeCat?' active':'');
    if(cat.id===activeCat)tab.style.background=cat.color;
    tab.textContent=cat.icon+' '+cat.label;
    tab.onclick=()=>{activeCat=cat.id;shoppingList={};activePanel=null;document.getElementById('side-panel').style.display='none';render()};
    nav.appendChild(tab);

}

/* ═══════════════════════════════════════════════
   SUGGEST BANNER
═══════════════════════════════════════════════ */
function renderSuggest(){
  const area=document.getElementById('suggest-area');
  if(activeCat==='recipes'){area.innerHTML='';return}
  const hist=getHistory().filter(h=>h.catId===activeCat);
  if(!hist.length){area.innerHTML='';return}
  const last=hist[0];
  area.innerHTML=`<div class="suggest-banner"><p>📊 בפעם הקודמת קנית ${last.items.length} פריטים ב${last.catLabel} (${last.date})</p><button class="suggest-btn" id="load-hist-btn">טען →</button></div>`;
  document.getElementById('load-hist-btn').onclick=()=>loadFromHistory(last.items);
}
function loadFromHistory(items){
  shoppingList={};
  items.forEach(item=>{shoppingList[item.n]={...item,qty:item.qty||'1',checked:false}});
  renderList();showToast('✅ הרשימה נטענה!');
}

═══════════════════════════════════════════════ */
function renderProducts(){
  const cat=getCat();
  document.getElementById('panel-title').textContent=cat.label;
  const addBtn=document.getElementById('add-btn');
  addBtn.style.background=cat.color+'22';addBtn.style.color=cat.color;
  const list=document.getElementById('product-list');list.innerHTML='';
  const userNames=getUserProducts(cat.id).map(p=>p.n);
  getAllProducts(cat.id).forEach(p=>{
    const div=document.createElement('div');div.className='product-item';
    const isUser=userNames.includes(p.n);
    div.innerHTML=`<span class="drag-handle">⠿</span><span class="product-emoji">${p.e}</span><div style="flex:1;min-width:0"><div class="product-name">${p.n}</div><div class="product-hint">לחץ להוסיף</div></div>${isUser?`<button class="remove-product-btn" data-n="${p.n}">×</button>`:''}`;
    div.addEventListener('click',()=>addToList(p));
    div.setAttribute('draggable','true');
    div.addEventListener('dragstart',ev=>{dragItem=p;ev.dataTransfer.effectAllowed='copy';createGhost(p,ev.clientX,ev.clientY)});
    div.addEventListener('dragend',()=>{removeGhost();dragItem=null});
    div.addEventListener('touchstart',ev=>touchStart(ev,p),{passive:true});
    const rb=div.querySelector('.remove-product-btn');
    if(rb)rb.onclick=e=>{e.stopPropagation();deleteUserProduct(cat.id,p.n);renderProducts()};
    list.appendChild(div);
  });
}

/* ═══════════════════════════════════════════════
   SHOPPING LIST
═══════════════════════════════════════════════ */
function updateProgress(){
  const items=Object.values(shoppingList);
  const checked=items.filter(i=>i.checked).length;
  const pct=items.length?Math.round(checked/items.length*100):0;
  const pEl=document.getElementById('progress');
  const cEl=document.getElementById('list-count');
  if(pEl)pEl.style.width=pct+'%';
  if(cEl)cEl.textContent=`${checked}/${items.length} פריטים`;
}

function renderList(){
  const zone=document.getElementById('drop-zone');
  if(!zone)return;
  const emptyMsg=document.getElementById('empty-msg');
  zone.querySelectorAll('.list-item').forEach(el=>el.remove());
  const items=Object.values(shoppingList);
  if(!items.length){if(emptyMsg)emptyMsg.style.display='block';updateProgress();return}
  if(emptyMsg)emptyMsg.style.display='none';
  [...items.filter(i=>!i.checked),...items.filter(i=>i.checked)].forEach(item=>{
    const div=document.createElement('div');div.className='list-item'+(item.checked?' checked':'');
    div.innerHTML=`<button class="check-btn${item.checked?' done':''}">${item.checked?'✓':''}</button><span class="list-item-emoji">${item.e}</span><div class="list-item-info"><div class="list-item-name">${item.n}</div>${item.source?`<span class="item-source">🍳 ${item.source}</span>`:''}</div><input class="qty-input" type="tel" value="${item.qty||'1'}" placeholder="כמות"><button class="remove-btn">×</button>`;
    div.querySelector('.check-btn').onclick=()=>{shoppingList[item.n].checked=!shoppingList[item.n].checked;renderList()};
    div.querySelector('.qty-input').oninput=e=>{if(shoppingList[item.n])shoppingList[item.n].qty=e.target.value};
    div.querySelector('.remove-btn').onclick=()=>{delete shoppingList[item.n];renderList()};
    zone.appendChild(div);
  });
  updateProgress();
}

function clearChecked(){
  Object.keys(shoppingList).forEach(k=>{if(shoppingList[k].checked)delete shoppingList[k]});
  renderList();showToast('🧹 פריטים שסומנו הוסרו');
}

function addToList(p,source){
  const key=p.n;
  if(!shoppingList[key]){
    shoppingList[key]={...p,qty:p.qty||'1',checked:false};
    if(source)shoppingList[key].source=source;
    renderList();showToast('✅ '+p.n+' נוסף');
  } else {showToast('כבר ברשימה: '+p.n)}
}

function bindDrop(){
  const dz=document.getElementById('drop-zone');
  if(!dz)return;
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
  dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');if(dragItem)addToList(dragItem);removeGhost()});
}

/* ═══════════════════════════════════════════════
   RECIPES PANEL
═══════════════════════════════════════════════ */
function buildRecipesPanel(){
  const wrapper=document.createElement('div');
  wrapper.className='recipes-full';
  wrapper.style.width='100%';

  // URL input bar
  const bar=document.createElement('div');bar.className='recipe-input-bar';
  bar.innerHTML=`<div class="recipe-input-row"><input class="yt-input" id="yt-url" type="url" placeholder="הדבק קישור YouTube של מתכון..." autocomplete="off" autocorrect="off" spellcheck="false"><button class="analyze-btn" id="analyze-btn">🎬 נתח</button></div>`;
  wrapper.appendChild(bar);

  // Analyzing indicator (hidden)
  const analyzing=document.createElement('div');
  analyzing.className='analyzing-bar';analyzing.id='analyzing-bar';analyzing.style.display='none';
  analyzing.innerHTML=`<div class="spinner"></div><span id="analyzing-txt">מנתח את הסרטון...</span>`;
  wrapper.appendChild(analyzing);

  // Recipes scroll area
  const scroll=document.createElement('div');scroll.className='recipes-scroll';scroll.id='recipes-scroll';
  wrapper.appendChild(scroll);

  // Bind analyze button
  bar.querySelector('#analyze-btn').onclick=()=>analyzeYouTube();
  bar.querySelector('#yt-url').addEventListener('keydown',e=>{if(e.key==='Enter')analyzeYouTube()});

  renderRecipesList(scroll);
  return wrapper;
}

function renderRecipesList(container){
  if(!container)container=document.getElementById('recipes-scroll');
  if(!container)return;
  container.innerHTML='';
  const recipes=getRecipes();
  if(!recipes.length){
    container.innerHTML=`<div class="empty-recipes"><div class="big-icon">🎬</div><h3>אין מתכונים עדיין</h3><p>הדבק קישור YouTube של מתכון<br>והאפליקציה תחלץ את המרכיבים אוטומטית</p></div>`;
    return;
  }
  recipes.forEach(recipe=>{
    container.appendChild(buildRecipeCard(recipe));
  });
}

function buildRecipeCard(recipe){
  if(!selectedIngredients[recipe.id])selectedIngredients[recipe.id]=new Set(recipe.ingredients.map((_,i)=>i));
  const isOpen=expandedRecipes[recipe.id]||false;
  const sel=selectedIngredients[recipe.id];

  const card=document.createElement('div');card.className='recipe-card';card.id='rcard-'+recipe.id;

  // Header
  const header=document.createElement('div');header.className='recipe-card-header';
  header.innerHTML=`
    <div class="recipe-thumb-placeholder">🍳</div>
    <div class="recipe-info">
      <div class="recipe-title">${recipe.title}</div>
      <div class="recipe-meta">${recipe.ingredients.length} מרכיבים · ${recipe.date}</div>
    </div>
    <span class="recipe-chevron${isOpen?' open':''}">▾</span>`;
  header.onclick=()=>toggleRecipeExpand(recipe.id);

  // Actions row
  const actions=document.createElement('div');actions.className='recipe-actions';
  actions.innerHTML=`<button class="recipe-add-all">+ הוסף הכל לרשימה</button><button class="recipe-delete">🗑 מחק</button>`;
  actions.querySelector('.recipe-add-all').onclick=e=>{e.stopPropagation();addAllIngredients(recipe)};
  actions.querySelector('.recipe-delete').onclick=e=>{e.stopPropagation();deleteRecipe(recipe.id);renderRecipesList();showToast('🗑 מתכון נמחק')};

  card.appendChild(header);
  card.appendChild(actions);

  // Ingredients (collapsible)
  if(isOpen){
    const ingList=document.createElement('div');ingList.className='recipe-ingredients';
    recipe.ingredients.forEach((ing,idx)=>{
      const row=document.createElement('div');
      row.className='ingredient-row'+(sel.has(idx)?' selected':'');
      row.innerHTML=`<div class="ing-check">${sel.has(idx)?'✓':''}</div><span class="ing-emoji">${ing.e||'🥄'}</span><span class="ing-name">${ing.n}</span><span class="ing-qty">${ing.qty||''}</span>`;
      row.onclick=()=>{
        if(sel.has(idx))sel.delete(idx);else sel.add(idx);
        row.classList.toggle('selected',sel.has(idx));
        row.querySelector('.ing-check').textContent=sel.has(idx)?'✓':'';
        updateAddSelectedBtn(recipe.id,sel);
      };
      ingList.appendChild(row);
    });

    const addSelBtn=document.createElement('button');
    addSelBtn.className='recipe-add-selected';
    addSelBtn.id='add-sel-'+recipe.id;
    addSelBtn.disabled=sel.size===0;
    addSelBtn.textContent=`הוסף ${sel.size} נבחרים לרשימה`;
    addSelBtn.onclick=()=>addSelectedIngredients(recipe,sel);
    ingList.appendChild(addSelBtn);
    card.appendChild(ingList);
  }

  return card;
}

function updateAddSelectedBtn(recipeId,sel){
  const btn=document.getElementById('add-sel-'+recipeId);
  if(btn){btn.disabled=sel.size===0;btn.textContent=`הוסף ${sel.size} נבחרים לרשימה`}
}

function toggleRecipeExpand(id){
  expandedRecipes[id]=!expandedRecipes[id];
  renderRecipesList();
}

function addAllIngredients(recipe){
  recipe.ingredients.forEach(ing=>{
    addToList({e:ing.e||'🥄',n:ing.n,qty:ing.qty||'1'},recipe.title);
  });
  // switch to first super cat to show the list
  activeCat='super-complete';render();
  showToast('✅ כל המרכיבים נוספו לרשימה!');
}

function addSelectedIngredients(recipe,sel){
  recipe.ingredients.forEach((ing,idx)=>{
    if(sel.has(idx))addToList({e:ing.e||'🥄',n:ing.n,qty:ing.qty||'1'},recipe.title);
  });
  activeCat='super-complete';render();
  showToast(`✅ ${sel.size} מרכיבים נוספו לרשימה!`);
}

/* ═══════════════════════════════════════════════
   YOUTUBE ANALYSIS via Claude API
═══════════════════════════════════════════════ */
async function analyzeYouTube(){
  const urlInput=document.getElementById('yt-url');
  const url=(urlInput?.value||'').trim();
  if(!url){showToast('נא להכניס קישור YouTube');return}
  if(!url.includes('youtube.com')&&!url.includes('youtu.be')){showToast('נא להכניס קישור YouTube תקין');return}
  if(analyzingRecipe)return;
  analyzingRecipe=true;

  const analyzeBtn=document.getElementById('analyze-btn');
  const analyzingBar=document.getElementById('analyzing-bar');
  const analyzingTxt=document.getElementById('analyzing-txt');
  if(analyzeBtn)analyzeBtn.disabled=true;
  if(analyzingBar)analyzingBar.style.display='flex';
  if(analyzingTxt)analyzingTxt.textContent='מנתח את הסרטון...';

  try {
    const prompt=`You are a recipe ingredient extractor. The user gave you this YouTube URL: ${url}

Your job:
1. Extract the video ID from the URL
2. Based on common knowledge about recipes on YouTube, or if you can identify the recipe from the URL/title, extract the ingredients list
3. If you cannot identify the specific recipe, respond with a plausible generic recipe based on any hints in the URL

Respond ONLY with a valid JSON object in this exact format (no markdown, no explanation):
{
  "title": "שם המתכון בעברית",
  "ingredients": [
    {"n": "שם המרכיב בעברית", "e": "emoji מתאים", "qty": "כמות (לדוגמה: 2 כוסות, 500 גרם)"},
    ...
  ]
}

Rules:
- Title must be in Hebrew
- Ingredient names must be in Hebrew  
- Choose the most fitting food emoji for each ingredient
- Include realistic quantities
- Include 6-15 ingredients typical for this type of recipe
- If URL contains recipe hints (pasta, chicken, chocolate, etc.) use those
- Always return valid JSON, never return empty ingredients`;

    if(analyzingTxt)analyzingTxt.textContent='שולח לניתוח AI...';

    const response=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        messages:[{role:'user',content:prompt}]
      })
    });

    if(analyzingTxt)analyzingTxt.textContent='מעבד תוצאות...';
    const data=await response.json();

    // Extract text from response (may include tool use blocks)
    const textBlock=data.content?.find(b=>b.type==='text');
    const raw=textBlock?.text||'';

    // Parse JSON from response
    let parsed;
    try{
      const jsonMatch=raw.match(/\{[\s\S]*\}/);
      parsed=JSON.parse(jsonMatch?.[0]||raw);
    }catch(e){
      throw new Error('לא הצלחתי לפרסר את התגובה');
    }

    if(!parsed.title||!parsed.ingredients?.length){
      throw new Error('לא נמצאו מרכיבים');
    }

    const recipe={
      id:'r'+Date.now(),
      title:parsed.title,
      url,
      date:new Date().toLocaleDateString('he-IL'),
      ingredients:parsed.ingredients
    };

    saveRecipe(recipe);
    if(urlInput)urlInput.value='';
    expandedRecipes[recipe.id]=true;
    selectedIngredients[recipe.id]=new Set(recipe.ingredients.map((_,i)=>i));
    renderRecipesList();
    showToast('✅ המתכון נוסף! '+parsed.ingredients.length+' מרכיבים');

  }catch(err){
    console.error(err);
    showToast('❌ שגיאה: '+err.message);
  }finally{
    analyzingRecipe=false;
    if(analyzeBtn)analyzeBtn.disabled=false;
    if(analyzingBar)analyzingBar.style.display='none';
  }
}

/* ═══════════════════════════════════════════════
   FINISH / HISTORY / EXPORT
═══════════════════════════════════════════════ */
function finishShopping(){
  const items=Object.values(shoppingList);
  if(!items.length){showToast('הרשימה ריקה');return}
  saveToHistory(activeCat,items);
  shoppingList={};renderList();renderSuggest();
  document.getElementById('side-panel').style.display='none';activePanel=null;
  showToast('✅ הקניה נשמרה!');
}

function togglePanel(type){
  const sp=document.getElementById('side-panel');
  if(activePanel===type){activePanel=null;sp.style.display='none';sp.innerHTML='';return}
  activePanel=type;sp.style.display='block';
  if(type==='history')renderHistoryPanel();
  else renderExportPanel();
}

function renderHistoryPanel(){
  const sp=document.getElementById('side-panel');
  const hist=getHistory();
  let html='<div class="history-panel"><h3>📋 היסטוריית קניות</h3>';
  if(!hist.length){html+='<p style="font-size:12px;color:var(--muted)">עדיין אין היסטוריה.</p></div>';sp.innerHTML=html;return}
  const grouped={};hist.forEach(h=>{if(!grouped[h.catId])grouped[h.catId]=[];grouped[h.catId].push(h)});
  Object.entries(grouped).forEach(([catId,entries])=>{
    const cat=CATS.find(c=>c.id===catId);
    html+=`<div class="cat-label">${cat?.icon||''} ${cat?.label||catId}</div>`;
    entries.slice(0,3).forEach((h,i)=>{
      const names=h.items.map(i=>i.e+i.n).join(', ');
      html+=`<div class="hist-card"><div class="hist-header"><span class="hist-title">${h.items.length} פריטים</span><span class="hist-date">${h.date}</span></div><div class="hist-items">${names}</div><button class="use-list-btn" data-idx="${i}" data-cat="${catId}">השתמש ברשימה →</button></div>`;
    });
  });
  html+=`<button class="finish-btn" onclick="finishShopping()">✅ סיים קניה ושמור</button></div>`;
  sp.innerHTML=html;
  sp.querySelectorAll('.use-list-btn').forEach(btn=>{
    btn.onclick=()=>{
      const catId=btn.dataset.cat;const idx=parseInt(btn.dataset.idx);
      const entries=getHistory().filter(h=>h.catId===catId);
      if(entries[idx]){activeCat=catId;loadFromHistory(entries[idx].items);activePanel=null;sp.style.display='none';render()}
    };
  });
}

function renderExportPanel(){
  const sp=document.getElementById('side-panel');
  const items=Object.values(shoppingList);
  const cat=getCat();
  const text=items.length?`🛒 רשימת קניות – ${cat.label}\n${new Date().toLocaleDateString('he-IL')}\n\n${items.map(i=>`${i.e} ${i.n} × ${i.qty||'1'}${i.source?' ('+i.source+')':''}`).join('\n')}`:'הרשימה ריקה';
  sp.innerHTML=`<div class="export-area"><h3>📤 ייצוא רשימה</h3><textarea class="export-text" readonly>${text}</textarea><div class="export-row"><button class="export-btn" id="copy-btn">📋 העתק</button><button class="export-btn" id="wa-btn">💬 WhatsApp</button></div><button class="finish-btn" onclick="finishShopping()">✅ סיים קניה ושמור</button></div>`;
  document.getElementById('copy-btn').onclick=()=>{
    if(navigator.share)navigator.share({text});
    else if(navigator.clipboard)navigator.clipboard.writeText(text).then(()=>showToast('הועתק!'));
    else{sp.querySelector('textarea').select();document.execCommand('copy');showToast('הועתק!')}
  };
  document.getElementById('wa-btn').onclick=()=>window.open('https://wa.me/?text='+encodeURIComponent(text),'_blank');
}

/* ═══════════════════════════════════════════════
   DRAG & DROP
═══════════════════════════════════════════════ */
function createGhost(p,x,y){removeGhost();dragGhost=document.createElement('div');dragGhost.className='drag-ghost';dragGhost.innerHTML=`<span style="font-size:20px">${p.e}</span><span>${p.n}</span>`;dragGhost.style.cssText=`left:${x-60}px;top:${y-20}px`;document.body.appendChild(dragGhost)}
function removeGhost(){if(dragGhost){dragGhost.remove();dragGhost=null}}
document.addEventListener('dragover',e=>{e.preventDefault();if(dragGhost){dragGhost.style.left=(e.clientX-60)+'px';dragGhost.style.top=(e.clientY-20)+'px'}});

function touchStart(e,p){
  touchProduct=p;createGhost(p,e.touches[0].clientX,e.touches[0].clientY);
  document.addEventListener('touchmove',onTM,{passive:false});
  document.addEventListener('touchend',onTE,{once:true});
}
function onTM(e){
  e.preventDefault();const t=e.touches[0];
  if(dragGhost){dragGhost.style.left=(t.clientX-60)+'px';dragGhost.style.top=(t.clientY-20)+'px'}
  const dz=document.getElementById('drop-zone');if(!dz)return;
  const r=dz.getBoundingClientRect();
  dz.classList.toggle('drag-over',t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom);
}
function onTE(e){
  document.removeEventListener('touchmove',onTM);
  const t=e.changedTouches[0];
  const dz=document.getElementById('drop-zone');
  if(dz){const r=dz.getBoundingClientRect();if(t.clientX>=r.left&&t.clientX<=r.right&&t.clientY>=r.top&&t.clientY<=r.bottom&&touchProduct)addToList(touchProduct);}
  dz&&dz.classList.remove('drag-over');removeGhost();touchProduct=null;
}

/* ═══════════════════════════════════════════════
   ADD PRODUCT MODAL
═══════════════════════════════════════════════ */
const EMOJIS=['🍎','🥦','🥕','🧅','🧄','🍋','🍌','🍇','🥑','🥩','🐟','🧀','🥚','🧈','🥛','🍞','🫙','🧂','🫒','🍫','🧃','💧','🧹','🧼','🧻','🛒','🌿','🍄','🌽','🥜','🍕','🥐','🍳','🥞','🧆','🥗','🍜','🥤'];

function openAddModal(){
  const cat=getCat();selEmoji=cat.icon;
  const overlay=document.createElement('div');overlay.className='modal-wrap';
  overlay.innerHTML=`<div class="modal"><h3>הוסף מוצר ל${cat.label}</h3><div class="emoji-row">${EMOJIS.map(em=>`<span class="emoji-opt${em===selEmoji?' sel':''}" data-e="${em}">${em}</span>`).join('')}</div><input type="text" id="np" placeholder="שם המוצר..." autocomplete="off"><div class="modal-btns"><button class="btn-cancel" id="mc">ביטול</button><button class="btn-add" style="background:${cat.color}" id="ma">הוסף</button></div></div>`;
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};
  overlay.querySelectorAll('.emoji-opt').forEach(el=>el.onclick=()=>{selEmoji=el.dataset.e;overlay.querySelectorAll('.emoji-opt').forEach(x=>x.classList.remove('sel'));el.classList.add('sel')});
  overlay.querySelector('#mc').onclick=()=>overlay.remove();
  overlay.querySelector('#ma').onclick=()=>{
    const name=overlay.querySelector('#np').value.trim();if(!name)return;
    saveUserProduct(activeCat,{e:selEmoji,n:name});
    overlay.remove();renderProducts();showToast('✅ '+name+' נוסף');
  };
  document.body.appendChild(overlay);
  setTimeout(()=>overlay.querySelector('#np').focus(),150);
}

/* ═══════════════════════════════════════════════
   BOOT
═══════════════════════════════════════════════ */
render();
</script>
</body>
